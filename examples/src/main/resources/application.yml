# ============================================================================
# Metrics / Prometheus
# ============================================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name:payment-service}
      environment: ${ENVIRONMENT:dev}

# ============================================================================
# Logging
# ============================================================================
logging:
  level:
    com.dev.payments.framework: INFO
    # Set to DEBUG for troubleshooting
    # com.dev.payments.framework: DEBUG
    
    # SQL logging (development only)
    # org.hibernate.SQL: DEBUG
    # org.hibernate.type.descriptor.sql: TRACE
